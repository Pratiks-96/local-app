services:
  postgres:
    image: postgres:16-alpine
    container_name: localconnect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-localconnect}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-localconnect}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - localconnect

  redis:
    image: redis:7-alpine
    container_name: localconnect-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - localconnect

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: localconnect-backend
    restart: unless-stopped
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-localconnect}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-localconnect-dev-jwt-secret-min-32-characters}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-localconnect-dev-refresh-secret-min-32}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      USE_LOCAL_STORAGE: "true"
      LOCAL_UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - localconnect

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: localconnect-frontend
    restart: unless-stopped
    networks:
      - localconnect

  nginx:
    image: nginx:alpine
    container_name: localconnect-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - localconnect

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  localconnect:
    driver: bridge
