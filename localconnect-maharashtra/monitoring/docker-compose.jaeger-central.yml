# Run on CENTRAL tracing VM (separate from LocalConnect app VM)
# Usage on Jaeger VM:
#   docker compose -f docker-compose.jaeger-central.yml up -d
#
# UI:  http://JAEGER_VM_IP:16686
# OTLP: http://JAEGER_VM_IP:4318  (app sends traces here)

services:
  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP (from LocalConnect backend)
      - "4317:4317"     # OTLP gRPC (optional)
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - jaeger-net

networks:
  jaeger-net:
    driver: bridge
