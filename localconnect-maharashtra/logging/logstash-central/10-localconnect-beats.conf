# Paste this file on CENTRAL logging VM (20.198.104.118)
# Path examples:
#   Docker Logstash: mount into /usr/share/logstash/pipeline/
#   Package install: /etc/logstash/conf.d/10-localconnect-beats.conf
#
# Then: sudo systemctl restart logstash
#       OR: docker restart logstash

input {
  beats {
    port => 5044
    # Optional: only accept from app server IP (uncomment and set)
    # host => "0.0.0.0"
  }
}

filter {
  if [app] == "localconnect" {
    mutate {
      add_tag => [ "localconnect" ]
    }
  }

  if [container][name] {
    mutate {
      rename => { "[container][name]" => "container_name" }
    }
  }

  if [message] =~ /^\s*\{/ {
    json {
      source => "message"
      target => "parsed"
      skip_on_invalid_json => true
    }
  }
}

output {
  elasticsearch {
    hosts => [ "http://127.0.0.1:9200" ]
    index => "localconnect-%{+YYYY.MM.dd}"
  }

  # Debug: also print to Logstash log (remove in production)
  # stdout { codec => rubydebug }
}
