# Filebeat on APPLICATION VM — ships Docker container logs to central Logstash
# Set LOGSTASH_HOST in .env (e.g. 20.198.104.118)

filebeat.inputs:
  - type: filestream
    id: docker-containers
    enabled: true
    paths:
      - /var/lib/docker/containers/*/*-json.log
    parsers:
      - container:
          stream: all
          format: auto
    processors:
      - add_docker_metadata:
          host: unix:///var/run/docker.sock
      - decode_json_fields:
          fields: ["message"]
          target: ""
          overwrite_keys: true
          add_error_key: true
          when:
            regexp:
              message: '^\{'

processors:
  - add_fields:
      target: ''
      fields:
        app: localconnect
        source: application-vm

output.logstash:
  hosts: ["${LOGSTASH_HOST:20.198.104.118}:${LOGSTASH_PORT:5044}"]

logging.level: info
logging.to_stderr: true
