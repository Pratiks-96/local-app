# ─────────────────────────────────────────────────────────────
#  Nginx Reverse Proxy — EC2 → Minikube Port Forwarding
#
#  Public  :80   → Nginx
#  Nginx         → Minikube via kubectl port-forward
#
#  Frontend  127.0.0.1:30300  (kubectl port-forward svc/frontend)
#  Backend   127.0.0.1:30800  (kubectl port-forward svc/backend)
#  Prometheus 127.0.0.1:30909
#  Grafana   127.0.0.1:30301
# ─────────────────────────────────────────────────────────────

upstream frontend {
    server 127.0.0.1:30300;
    keepalive 16;
}

upstream backend {
    server 127.0.0.1:30800;
    keepalive 16;
}

upstream prometheus {
    server 127.0.0.1:30909;
}

upstream grafana {
    server 127.0.0.1:30301;
}

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/localconnect_access.log;
    error_log  /var/log/nginx/localconnect_error.log warn;

    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ── Backend API ─────────────────────────────────────────
    # http://<EC2-IP>/api/ → minikube backend:8000
    location /api/ {
        proxy_pass         http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # ── Health & Metrics ────────────────────────────────────
    location /health {
        proxy_pass http://backend/health;
        access_log off;
    }

    location /metrics {
        proxy_pass http://backend/metrics;
    }

    # ── Swagger Docs ────────────────────────────────────────
    location /docs {
        proxy_pass http://backend/docs;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://backend/openapi.json;
        proxy_set_header Host $host;
    }

    # ── Prometheus UI ───────────────────────────────────────
    # http://<EC2-IP>/prometheus/
    location /prometheus/ {
        proxy_pass http://prometheus/;
        proxy_set_header Host $host;
    }

    # ── Grafana UI ──────────────────────────────────────────
    # http://<EC2-IP>/grafana/
    location /grafana/ {
        proxy_pass         http://grafana/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend React App (catch-all) ──────────────────────
    # http://<EC2-IP>/ → minikube frontend:80
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Nginx self health ───────────────────────────────────
    location /nginx-status {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
